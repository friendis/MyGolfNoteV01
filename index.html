<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolfNote — 골프 학습 매니저</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --navy: #0d1b2e; --navy2: #13243d; --navy3: #1a2f4a;
    --gold: #c8a84b; --gold2: #e6c76a; --gold-dim: #8a7030;
    --cream: #f2ead6;
    --text: #dce8f5; --text-dim: #7a9ab8; --text-muted: #4a6a8a;
    --green2: #52b870; --red2: #c05050;
    --border: rgba(200,168,75,0.18); --border2: rgba(200,168,75,0.35);
    --shadow2: 0 8px 40px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR','DM Sans',sans-serif;
    background: var(--navy); color: var(--text); min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,168,75,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(61,138,90,0.05) 0%, transparent 60%);
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1rem;
  }
  .auth-box {
    background: var(--navy2); border: 1px solid var(--border2);
    border-radius: 16px; padding: 2.5rem 2rem;
    width: 100%; max-width: 380px;
    box-shadow: var(--shadow2);
  }
  .auth-logo {
    font-family: 'Cormorant Garamond',serif;
    font-size: 2rem; font-weight: 700; color: var(--gold2);
    text-align: center; margin-bottom: 0.3rem;
  }
  .auth-sub {
    font-size: 0.72rem; color: var(--text-muted); text-align: center;
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 2rem;
  }
  .auth-tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .auth-tab {
    flex: 1; padding: 0.6rem; background: none; border: none;
    color: var(--text-muted); font-family: inherit; font-size: 0.88rem;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .auth-tab.active { color: var(--gold2); border-bottom-color: var(--gold); }
  .auth-err {
    background: rgba(192,80,80,0.12); border: 1px solid rgba(192,80,80,0.25);
    color: #f0a0a0; font-size: 0.82rem; padding: 0.6rem 0.8rem;
    border-radius: 8px; margin-bottom: 1rem; display: none;
  }
  .auth-ok {
    background: rgba(82,184,112,0.12); border: 1px solid rgba(82,184,112,0.25);
    color: #90e0a0; font-size: 0.82rem; padding: 0.6rem 0.8rem;
    border-radius: 8px; margin-bottom: 1rem; display: none;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg,#0a1520 0%,var(--navy2) 100%);
    border-bottom: 1px solid var(--border2);
    padding: 0 1.5rem; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 900px; margin: 0 auto; height: 64px;
  }
  .logo { display: flex; align-items: baseline; gap: 0.6rem; }
  .logo-title { font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:700; color:var(--gold2); }
  .logo-sub { font-size:0.68rem; color:var(--text-muted); letter-spacing:3px; text-transform:uppercase; }
  .header-actions { display:flex; gap:0.5rem; align-items:center; }
  .user-email { font-size:0.75rem; color:var(--text-muted); max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--green2); display:inline-block; margin-right:4px; }
  .sync-dot.syncing { background:var(--gold); animation: pulse 1s infinite; }
  .sync-dot.error { background:var(--red2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn-icon {
    background:rgba(200,168,75,0.08); border:1px solid var(--border);
    color:var(--gold); padding:0.4rem 0.9rem; border-radius:6px;
    font-size:0.75rem; font-weight:500; cursor:pointer; transition:all 0.15s; font-family:inherit;
  }
  .btn-icon:hover { background:rgba(200,168,75,0.16); border-color:var(--border2); }
  .btn-icon.danger { color:var(--red2); border-color:rgba(192,80,80,0.2); background:rgba(192,80,80,0.06); }

  /* ── TABS ── */
  .tabs { background:var(--navy2); border-bottom:1px solid var(--border); position:sticky; top:64px; z-index:99; }
  .tabs-inner { display:flex; max-width:900px; margin:0 auto; }
  .tab-btn {
    flex:1; padding:0.85rem 1rem; background:none; border:none;
    color:var(--text-muted); font-family:inherit; font-size:0.88rem; font-weight:500;
    cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s;
  }
  .tab-btn.active { color:var(--gold2); border-bottom-color:var(--gold); }

  /* ── MAIN ── */
  main { max-width:900px; margin:0 auto; padding:1.5rem 1rem 4rem; }
  .page { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* ── LOADING ── */
  .loading-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:60vh; gap:1rem; color:var(--text-muted); font-size:0.9rem;
  }
  .spinner {
    width:32px; height:32px; border:2px solid var(--border);
    border-top-color:var(--gold); border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── STATS ── */
  .stats-row { display:flex; gap:0.75rem; margin-bottom:1.5rem; }
  .stat-card { flex:1; background:var(--navy2); border:1px solid var(--border); border-radius:10px; padding:0.9rem 1rem; text-align:center; }
  .stat-num { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; color:var(--gold2); line-height:1; margin-bottom:4px; }
  .stat-label { font-size:0.72rem; color:var(--text-muted); letter-spacing:0.5px; }

  /* ── FILTER BAR ── */
  .filter-bar { display:flex; gap:0.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
  .filter-bar input, .filter-bar select {
    background:var(--navy2); border:1px solid var(--border); color:var(--text);
    padding:0.55rem 0.9rem; border-radius:8px; font-family:inherit; font-size:0.85rem; outline:none;
    transition:border-color 0.15s;
  }
  .filter-bar input { flex:1; min-width:140px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color:var(--border2); }
  .filter-bar select { background-color:var(--navy2); min-width:100px; }

  /* ── CARDS ── */
  .card {
    background:var(--navy2); border:1px solid var(--border); border-radius:12px;
    padding:1rem 1.1rem; margin-bottom:0.65rem; cursor:pointer; transition:all 0.18s;
    position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:linear-gradient(180deg,var(--gold),transparent); opacity:0; transition:opacity 0.18s;
  }
  .card:hover { border-color:var(--border2); background:var(--navy3); transform:translateX(2px); }
  .card:hover::before { opacity:1; }
  .card-title { font-weight:700; font-size:0.95rem; margin-bottom:5px; color:var(--cream); }
  .card-meta { font-size:0.75rem; color:var(--text-muted); margin-top:5px; }

  /* ── BADGES ── */
  .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:0.7rem; font-weight:600; margin-right:4px; margin-bottom:2px; letter-spacing:0.3px; }
  .badge-gold { background:rgba(200,168,75,0.15); color:var(--gold2); border:1px solid rgba(200,168,75,0.3); }
  .badge-green { background:rgba(61,138,90,0.15); color:var(--green2); border:1px solid rgba(61,138,90,0.3); }
  .badge-blue { background:rgba(70,120,200,0.15); color:#7ab0e8; border:1px solid rgba(70,120,200,0.25); }
  .badge-amber { background:rgba(200,130,40,0.15); color:#e8a050; border:1px solid rgba(200,130,40,0.3); }

  /* ── BACK BTN ── */
  .back-btn {
    display:inline-flex; align-items:center; gap:6px;
    background:none; border:none; color:var(--gold); font-family:inherit;
    font-size:0.82rem; cursor:pointer; padding:0; margin-bottom:1.25rem; transition:color 0.15s;
  }
  .back-btn:hover { color:var(--gold2); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size:0.72rem; font-weight:700; color:var(--text-muted);
    letter-spacing:2px; text-transform:uppercase; margin-bottom:0.5rem;
    display:flex; align-items:center; gap:0.5rem;
  }
  .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

  .divider { height:1px; background:var(--border); margin:1rem 0; }

  /* ── FORMS ── */
  .form-group { margin-bottom:0.85rem; }
  .form-label { display:block; font-size:0.72rem; font-weight:700; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
  .form-input, .form-select, .form-textarea {
    width:100%; background:var(--navy); border:1px solid var(--border); color:var(--text);
    padding:0.6rem 0.85rem; border-radius:8px; font-family:'Noto Sans KR',sans-serif;
    font-size:0.88rem; outline:none; transition:border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--border2); }
  .form-textarea { resize:vertical; min-height:80px; line-height:1.6; }
  .form-select { background-color:var(--navy); }
  .form-row { display:flex; gap:0.6rem; }
  .form-row > * { flex:1; }

  /* ── BUTTONS ── */
  .btn { padding:0.6rem 1.3rem; border-radius:8px; border:none; font-family:inherit; font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.15s; letter-spacing:0.3px; }
  .btn-primary { background:linear-gradient(135deg,var(--gold-dim),var(--gold)); color:var(--navy); }
  .btn-primary:hover { background:linear-gradient(135deg,var(--gold),var(--gold2)); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-secondary { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text-dim); }
  .btn-secondary:hover { background:rgba(255,255,255,0.08); }
  .btn-danger { background:rgba(140,50,50,0.2); border:1px solid rgba(140,50,50,0.3); color:var(--red2); }
  .btn-danger:hover { background:rgba(140,50,50,0.3); }
  .btn-sm { padding:0.35rem 0.75rem; font-size:0.78rem; }
  .btn-row { display:flex; gap:0.5rem; margin-top:1rem; }

  /* ── TIMESTAMPS ── */
  .ts-item { background:var(--navy); border:1px solid var(--border); border-radius:8px; padding:0.6rem 0.8rem; margin-bottom:0.4rem; display:flex; align-items:flex-start; gap:0.65rem; }
  .ts-time { background:rgba(200,168,75,0.12); border:1px solid rgba(200,168,75,0.25); color:var(--gold2); padding:2px 10px; border-radius:6px; font-size:0.78rem; font-weight:700; white-space:nowrap; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
  .ts-time:hover { background:rgba(200,168,75,0.25); }
  .ts-note { flex:1; font-size:0.85rem; color:var(--text-dim); line-height:1.5; }
  .ts-del { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.9rem; padding:0 2px; transition:color 0.15s; flex-shrink:0; }
  .ts-del:hover { color:var(--red2); }

  /* ── THUMBNAIL PLAYER ── */
  .yt-player { position:relative; width:100%; aspect-ratio:16/9; border-radius:10px; overflow:hidden; margin-bottom:0.75rem; border:1px solid var(--border); background:#111; display:block; text-decoration:none; }
  .yt-player img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.25s, filter 0.25s; filter:brightness(0.82); }
  .yt-player:hover img { transform:scale(1.03); filter:brightness(0.6); }
  .yt-player .play-btn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:68px; height:48px; background:#ff0000; border-radius:12px; display:flex; align-items:center; justify-content:center; transition:transform 0.2s, background 0.2s; box-shadow:0 4px 20px rgba(0,0,0,0.6); }
  .yt-player:hover .play-btn { transform:translate(-50%,-50%) scale(1.12); background:#cc0000; }
  .yt-player .play-btn svg { width:28px; height:28px; fill:white; margin-left:4px; }
  .yt-player .yt-label { position:absolute; bottom:0; left:0; right:0; padding:2rem 0.75rem 0.6rem; background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,transparent 100%); font-size:0.72rem; color:rgba(255,255,255,0.75); }

  /* ── INLINE EDIT ── */
  .inline-edit-row { display:flex; gap:0.5rem; align-items:center; background:var(--navy); border:1px solid var(--border2); border-radius:8px; padding:0.5rem 0.7rem; margin-bottom:0.75rem; }
  .inline-edit-row input { flex:1; background:transparent; border:none; color:var(--text); font-family:inherit; font-size:0.85rem; outline:none; }
  .inline-edit-row .edit-label { font-size:0.7rem; color:var(--text-muted); white-space:nowrap; letter-spacing:1px; text-transform:uppercase; }

  /* ── LINK ITEMS ── */
  .link-item { background:var(--navy); border:1px solid var(--border); border-radius:8px; padding:0.7rem 0.9rem; margin-bottom:0.4rem; }
  .link-item a { color:var(--gold); text-decoration:none; font-size:0.88rem; }
  .link-item a:hover { color:var(--gold2); }
  .link-price { font-weight:700; color:#e8c87a; font-size:0.9rem; }
  .link-date { font-size:0.72rem; color:var(--text-muted); margin-top:2px; }

  /* ── KEYWORD PILLS ── */
  .keyword-pills { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .kw-pill { padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:500; background:rgba(200,168,75,0.08); border:1px solid rgba(200,168,75,0.2); color:var(--gold); cursor:pointer; transition:all 0.12s; }
  .kw-pill:hover { background:rgba(200,168,75,0.18); }

  /* ── PRICE HISTORY ── */
  .price-history { margin-top:0.5rem; }
  .price-entry { display:flex; justify-content:space-between; font-size:0.8rem; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--text-dim); }

  /* ── DETAIL ── */
  .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; }
  .detail-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:700; color:var(--cream); line-height:1.3; }
  .price-big { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:700; color:#e8c87a; }

  /* ── ADD FORM ── */
  .add-form { background:var(--navy2); border:1px solid var(--border); border-radius:14px; padding:1.3rem; }
  .add-form-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:700; color:var(--gold2); margin-bottom:1.1rem; }
  .section-box { background:var(--navy); border:1px solid var(--border); border-radius:10px; padding:0.9rem 1rem; margin-bottom:0.85rem; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-muted); font-size:0.9rem; }
  .empty-icon { font-size:2.5rem; margin-bottom:0.75rem; opacity:0.5; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:var(--navy3); border:1px solid var(--border2); color:var(--gold2); padding:0.7rem 1.5rem; border-radius:30px; font-size:0.85rem; font-weight:500; box-shadow:var(--shadow2); z-index:999; animation:toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards; pointer-events:none; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes toastOut { from{opacity:1} to{opacity:0} }

  /* ── VIDEO THUMB ── */
  .video-thumb { width:90px; height:60px; object-fit:cover; border-radius:6px; flex-shrink:0; border:1px solid var(--border); }

  /* ── 동의 체크박스 ── */
  .agree-row {
    display:flex; align-items:flex-start; gap:0.6rem;
    margin:0.75rem 0 0; padding:0.75rem; border-radius:8px;
    background:rgba(200,168,75,0.05); border:1px solid var(--border);
    font-size:0.82rem; color:var(--text-dim); line-height:1.5;
  }
  .agree-row input[type=checkbox] { margin-top:2px; flex-shrink:0; accent-color:var(--gold); width:15px; height:15px; cursor:pointer; }
  .agree-row a { color:var(--gold); text-decoration:underline; cursor:pointer; }

  /* ── 모달 오버레이 ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
    align-items:flex-start; justify-content:center;
    padding:1rem; overflow-y:auto;
  }
  .modal-overlay.open { display:flex; }
  .modal-box {
    background:var(--navy2); border:1px solid var(--border2);
    border-radius:16px; width:100%; max-width:640px;
    padding:1.8rem; margin:auto;
    box-shadow:var(--shadow2);
    animation: fadeIn 0.2s ease;
  }
  .modal-title {
    font-family:'Cormorant Garamond',serif;
    font-size:1.3rem; font-weight:700; color:var(--gold2);
    margin-bottom:1.2rem; padding-bottom:0.75rem;
    border-bottom:1px solid var(--border);
  }
  .modal-close {
    float:right; background:none; border:none; color:var(--text-muted);
    font-size:1.3rem; cursor:pointer; line-height:1; margin-top:-2px;
    transition:color 0.15s;
  }
  .modal-close:hover { color:var(--text); }
  .privacy-section { margin-bottom:1.25rem; }
  .privacy-section h3 { font-size:0.88rem; font-weight:700; color:var(--cream); margin-bottom:0.4rem; }
  .privacy-section p, .privacy-section li { font-size:0.83rem; color:var(--text-dim); line-height:1.7; }
  .privacy-section ul { padding-left:1.2rem; }
  .privacy-section li { margin-bottom:0.2rem; }
  .privacy-date { font-size:0.75rem; color:var(--text-muted); margin-top:1rem; text-align:right; }

  /* ── 계정 패널 (헤더 드롭다운) ── */
  .account-panel {
    display:none; position:absolute; top:68px; right:1rem;
    background:var(--navy2); border:1px solid var(--border2);
    border-radius:12px; padding:1rem; min-width:260px;
    box-shadow:var(--shadow2); z-index:200;
    animation: fadeIn 0.15s ease;
  }
  .account-panel.open { display:block; }
  .account-panel-email { font-size:0.8rem; color:var(--text-muted); margin-bottom:0.75rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border); word-break:break-all; }
  .account-panel-btn {
    display:block; width:100%; text-align:left;
    background:none; border:none; font-family:inherit;
    font-size:0.85rem; padding:0.5rem 0.4rem; cursor:pointer;
    border-radius:6px; color:var(--text-dim); transition:all 0.15s;
    margin-bottom:2px;
  }
  .account-panel-btn:hover { background:rgba(255,255,255,0.05); color:var(--text); }
  .account-panel-btn.danger { color:var(--red2); }
  .account-panel-btn.danger:hover { background:rgba(140,50,50,0.15); }

  /* ── 위험 구역 박스 ── */
  .danger-zone {
    margin-top:0.75rem; padding:0.75rem;
    border:1px solid rgba(192,80,80,0.25);
    border-radius:8px; background:rgba(140,50,50,0.06);
  }
  .danger-zone-title { font-size:0.72rem; font-weight:700; color:var(--red2); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:0.5rem; }

  /* ── 연습 기록 ── */
  .shot-row {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:0.5rem;
    background:var(--navy); border:1px solid var(--border); border-radius:8px;
    padding:0.75rem; margin-bottom:0.5rem; position:relative;
  }
  .shot-num {
    position:absolute; top:0.5rem; left:0.6rem;
    font-size:0.68rem; color:var(--text-muted); font-weight:700; letter-spacing:1px;
  }
  .shot-field { display:flex; flex-direction:column; gap:3px; }
  .shot-field label { font-size:0.68rem; color:var(--text-muted); letter-spacing:0.5px; text-transform:uppercase; }
  .shot-field input {
    background:var(--navy2); border:1px solid var(--border); color:var(--text);

<script>
// ════════════════════════════════════════════════════════
// SUPABASE INIT
// ════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://wmxccuceisvvocumgbfd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndteGNjdWNlaXN2dm9jdW1nYmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc5NzEsImV4cCI6MjA4OTAwMzk3MX0.aD6DAEFs5UzyfNFWaA9Vo4CfAMwwla65R4lf1KPZ9WE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let currentUser = null;
let appData = { videos: [], equipment: [], sessions: [] };
let currentTab = 'videos';
let currentView = 'list';
let selectedId = null;
let realtimeChannel = null;
let practiceSubTab = 'sessions'; // sessions | stats
let chartInstances = {};

const VIDEO_CATS = ["드라이버","우드/하이브리드","아이언","웨지","퍼팅","숏게임","어프로치","멘탈","피트니스","코스매니지먼트","룰/에티켓","기타"];
const EQUIP_CATS = ["드라이버","우드/유틸리티","아이언","웨지","퍼터","골프공","골프백","카트/트롤리","의류","신발","글러브","액세서리","레인기어","기타"];
const CLUB_LIST = ["드라이버","3W","5W","유틸리티","2I","3I","4I","5I","6I","7I","8I","9I","PW","GW","SW","LW","퍼터"];

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
function fmtPrice(p) { return p!=null ? Number(p).toLocaleString('ko-KR')+'원' : '—'; }
function getVideoId(url) { const m=url.match(/(?:v=|youtu\.be\/)([^&\s?]+)/); return m?m[1]:null; }
function getThumbnail(url) { const id=getVideoId(url); return id?`https://img.youtube.com/vi/${id}/mqdefault.jpg`:''; }
function timeToSec(t) { const p=t.split(':').map(Number); return p.length===2?p[0]*60+p[1]:p[0]*3600+p[1]*60+p[2]; }
function today() { return new Date().toISOString().split('T')[0]; }

function showToast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (status==='syncing'?' syncing':status==='error'?' error':'');
  dot.title = status==='syncing'?'동기화 중...':status==='error'?'동기화 오류':'동기화됨';
}

// ════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('atab-login').classList.toggle('active', mode==='login');
  document.getElementById('atab-signup').classList.toggle('active', mode==='signup');
  document.getElementById('auth-btn').textContent = mode==='login'?'로그인':'회원가입';
  document.getElementById('auth-err').style.display='none';
  document.getElementById('auth-ok').style.display='none';
  // 회원가입 시에만 동의 항목 표시
  document.getElementById('signup-agree').style.display = mode==='signup'?'block':'none';
}

function showAuthErr(msg) {
  const el=document.getElementById('auth-err'); el.textContent=msg; el.style.display='block';
  document.getElementById('auth-ok').style.display='none';
}
function showAuthOk(msg) {
  const el=document.getElementById('auth-ok'); el.textContent=msg; el.style.display='block';
  document.getElementById('auth-err').style.display='none';
}

async function authSubmit() {
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  const btn=document.getElementById('auth-btn');
  if (!email||!pw) { showAuthErr('이메일과 비밀번호를 입력하세요'); return; }
  if (pw.length<6) { showAuthErr('비밀번호는 6자 이상이어야 합니다'); return; }

  if (authMode==='signup') {
    // 필수 동의 항목 검증
    if (!document.getElementById('agree-privacy').checked) {
      showAuthErr('개인정보 처리방침에 동의해주세요'); return;
    }
    if (!document.getElementById('agree-terms').checked) {
      showAuthErr('이용약관에 동의해주세요'); return;
    }
  }

  btn.disabled=true; btn.textContent='처리 중...';

  if (authMode==='signup') {
    const {error}=await sb.auth.signUp({email,password:pw});
    btn.disabled=false; btn.textContent='회원가입';
    if (error) { showAuthErr(error.message==='User already registered'?'이미 등록된 이메일입니다':error.message); return; }
    showAuthOk('가입 완료! 이제 로그인하세요.');
    switchAuthTab('login');
  } else {
    const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
    btn.disabled=false; btn.textContent='로그인';
    if (error) { showAuthErr('이메일 또는 비밀번호가 올바르지 않습니다'); return; }
    onSignIn(data.user);
  }
}

async function signOut() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  await sb.auth.signOut();
  currentUser=null; appData={videos:[],equipment:[]};
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.body.style.overflow='';
}

// ════════════════════════════════════════════════════════
// INIT — check existing session
// ════════════════════════════════════════════════════════
async function initApp() {
  const {data:{session}}=await sb.auth.getSession();
  if (session?.user) {
    await onSignIn(session.user);
  }
  // auth state change listener
  sb.auth.onAuthStateChange(async (event,session)=>{
    if (event==='SIGNED_IN' && session?.user) {
      if (!currentUser) await onSignIn(session.user);
    } else if (event==='SIGNED_OUT') {
      currentUser=null;
    }
  });
}

async function onSignIn(user) {
  currentUser=user;
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('user-email').textContent=user.email;
  document.getElementById('panel-email').textContent=user.email;

  showMainLoading();
  await loadAllData();
  setupRealtime();
  render();
}

// ════════════════════════════════════════════════════════
// 개인정보 처리방침 모달
// ════════════════════════════════════════════════════════
function openPrivacyModal() {
  document.getElementById('privacy-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePrivacyModal() {
  document.getElementById('privacy-modal').classList.remove('open');
  document.body.style.overflow='';
}

// ════════════════════════════════════════════════════════
// 계정 패널
// ════════════════════════════════════════════════════════
function toggleAccountPanel() {
  document.getElementById('account-panel').classList.toggle('open');
}
function closeAccountPanel() {
  document.getElementById('account-panel').classList.remove('open');
}
// 패널 바깥 클릭 시 닫기
document.addEventListener('click', function(e) {
  const panel = document.getElementById('account-panel');
  const btn = document.getElementById('account-btn');
  if (panel && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.remove('open');
  }
});

// ════════════════════════════════════════════════════════
// 계정 설정 모달 (회원탈퇴)
// ════════════════════════════════════════════════════════
function openAccountSettings() {
  document.getElementById('modal-user-email').textContent = currentUser?.email || '';
  document.getElementById('modal-data-count').textContent =
    `영상 ${appData.videos.length}개 · 장비 ${appData.equipment.length}개 · 연습 세션 ${appData.sessions.length}개`;
  document.getElementById('account-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeAccountSettings() {
  document.getElementById('account-modal').classList.remove('open');
  document.body.style.overflow='';
}

function showMainLoading() {
  document.getElementById('main-content').innerHTML=`
    <div class="loading-screen">
      <div class="spinner"></div>
      <span>데이터 불러오는 중...</span>
    </div>`;
}

// ════════════════════════════════════════════════════════
// DATA LOAD
// ════════════════════════════════════════════════════════
async function loadAllData() {
  setSyncStatus('syncing');
  try {
    const [vRes, eRes, sRes] = await Promise.all([
      sb.from('videos').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}),
      sb.from('equipment').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}),
      sb.from('practice_sessions').select('*').eq('user_id',currentUser.id).order('session_date',{ascending:false}),
    ]);
    if (vRes.error) throw vRes.error;
    if (eRes.error) throw eRes.error;
    if (sRes.error) throw sRes.error;
    appData.videos = vRes.data.map(dbToVideo);
    appData.equipment = eRes.data.map(dbToEquip);
    appData.sessions = sRes.data.map(dbToSession);
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('데이터 로드 실패: '+e.message);
  }
}

// DB row → app object
function dbToVideo(r) {
  return { id:r.id, url:r.url, title:r.title, keywords:r.keywords||[], memo:r.memo||'', timestamps:r.timestamps||[], addedAt:r.added_at };
}
function dbToEquip(r) {
  return { id:r.id, name:r.name, category:r.category||'', status:r.status||'wishlist', purchasePrice:r.purchase_price, purchaseDate:r.purchase_date, memo:r.memo||'', links:r.links||[], priceHistory:r.price_history||[] };
}
function dbToSession(r) {
  return { id:r.id, date:r.session_date, location:r.location||'', club:r.club||'', totalShots:r.total_shots||0, memo:r.memo||'', imageUrl:r.image_url||'', shots:r.shots||[] };
}

// ════════════════════════════════════════════════════════
// REALTIME SYNC
// ════════════════════════════════════════════════════════
function setupRealtime() {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'videos',filter:`user_id=eq.${currentUser.id}`},
      async ()=>{ await loadAllData(); if(currentTab==='videos'&&currentView==='list') render(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'equipment',filter:`user_id=eq.${currentUser.id}`},
      async ()=>{ await loadAllData(); if(currentTab==='equipment'&&currentView==='list') render(); })
    .subscribe();
}

// ════════════════════════════════════════════════════════
// ROUTING
// ════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab=tab; currentView='list'; selectedId=null;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  // 차트 인스턴스 정리
  Object.values(chartInstances).forEach(c=>{ try{c.destroy();}catch(e){} });
  chartInstances={};
  render();
}
function goList() { currentView='list'; selectedId=null; render(); }
function goDetail(id) { currentView='detail'; selectedId=id; render(); }
function goAdd() { currentView='add'; render(); }

function render() {
  const el=document.getElementById('main-content');
  if (currentTab==='videos') {
    if (currentView==='list') el.innerHTML=renderVideoList();
    else if (currentView==='detail') el.innerHTML=renderVideoDetail();
    else el.innerHTML=renderVideoAdd();
  } else if (currentTab==='equipment') {
    if (currentView==='list') el.innerHTML=renderEquipList();
    else if (currentView==='detail') el.innerHTML=renderEquipDetail();
    else el.innerHTML=renderEquipAdd();
  } else {
    if (currentView==='list') { el.innerHTML=renderPracticeList(); initPracticeCharts(); }
    else if (currentView==='detail') el.innerHTML=renderPracticeDetail();
    else el.innerHTML=renderPracticeAdd();
  }
}

function filterVideos(q,cat) {
  const f=appData.videos.filter(v=>{
    const mq=!q||v.title.includes(q)||v.keywords.some(k=>k.includes(q));
    const mc=!cat||v.keywords.includes(cat);
    return mq&&mc;
  });
  const c=document.getElementById('video-cards'); if(!c) return;
  if (!f.length) { c.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div>검색 결과가 없습니다.</div>`; return; }
  c.innerHTML=f.map(v=>{
    const thumb=getThumbnail(v.url);
    return `<div class="card" onclick="goDetail('${v.id}')">
      <div style="display:flex;gap:0.75rem;align-items:flex-start">
        ${thumb?`<img class="video-thumb" src="${thumb}" onerror="this.style.display='none'" alt="">`:''}
        <div style="flex:1;min-width:0">
          <div class="card-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(v.title)}</div>
          <div style="margin:4px 0">${v.keywords.map(k=>`<span class="badge badge-gold">${escHtml(k)}</span>`).join('')}</div>
          <div class="card-meta">⏱ ${v.timestamps.length}개 구간 · ${v.addedAt||''}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function playFrom(time, vid) {
  const v=appData.videos.find(x=>x.id===vid); if(!v) return;
  const videoId=getVideoId(v.url); if(!videoId) { showToast('유효한 YouTube URL이 없습니다'); return; }
  const sec=timeToSec(time);
  const iframe=document.getElementById('yt-iframe');
  if (iframe) {
    // iframe src를 해당 시간으로 교체하여 즉시 재생
    iframe.src=`https://www.youtube-nocookie.com/embed/${videoId}?rel=0&modestbranding=1&start=${sec}&autoplay=1`;
    // 플레이어로 부드럽게 스크롤
    iframe.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

async function saveVideo() {
  const url=document.getElementById('v-url').value.trim();
  const title=document.getElementById('v-title').value.trim();
  if (!url) { showToast('URL을 입력하세요'); return; }
  const kws=document.getElementById('v-kw').value.split(',').map(k=>k.trim()).filter(Boolean);
  const memo=document.getElementById('v-memo').value.trim();
  const btn=document.getElementById('v-save-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  setSyncStatus('syncing');
  const {error}=await sb.from('videos').insert({
    user_id:currentUser.id, url, title:title||'제목 없음',
    keywords:kws, memo, timestamps:[], added_at:today()
  });
  if (error) { showToast('저장 실패: '+error.message); btn.disabled=false; btn.textContent='저장'; setSyncStatus('error'); return; }
  await loadAllData();
  showToast('영상이 추가됐습니다');
  goList();
}

async function saveVideoTitle(id,newTitle) {
  const v=appData.videos.find(x=>x.id===id); if(!v) return;
  const t=newTitle.trim(); if(!t||t===v.title) return;
  setSyncStatus('syncing');
  const {error}=await sb.from('videos').update({title:t}).eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('저장 실패'); setSyncStatus('error'); return; }
  v.title=t; setSyncStatus('ok'); showToast('제목이 저장됐습니다');
}

async function saveVideoUrl(id,newUrl) {
  const v=appData.videos.find(x=>x.id===id); if(!v) return;
  const t=newUrl.trim(); if(!t||t===v.url) return;
  setSyncStatus('syncing');
  const {error}=await sb.from('videos').update({url:t}).eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('저장 실패'); setSyncStatus('error'); return; }
  v.url=t; setSyncStatus('ok'); showToast('URL이 저장됐습니다'); goDetail(id);
}

async function addTimestamp(vid) {
  const time=document.getElementById('ts-time').value.trim();
  const note=document.getElementById('ts-note').value.trim();
  if (!time||!note) { showToast('시간과 내용을 입력하세요'); return; }
  const v=appData.videos.find(x=>x.id===vid); if(!v) return;
  const newTs=[...v.timestamps,{time,note}].sort((a,b)=>timeToSec(a.time)-timeToSec(b.time));
  setSyncStatus('syncing');
  const {error}=await sb.from('videos').update({timestamps:newTs}).eq('id',vid).eq('user_id',currentUser.id);
  if (error) { showToast('저장 실패'); setSyncStatus('error'); return; }
  v.timestamps=newTs; setSyncStatus('ok'); showToast('구간이 추가됐습니다'); goDetail(vid);
}

async function deleteTimestamp(vid,idx) {
  if (!confirm('이 구간을 삭제하시겠습니까?')) return;
  const v=appData.videos.find(x=>x.id===vid); if(!v) return;
  const newTs=v.timestamps.filter((_,i)=>i!==idx);
  setSyncStatus('syncing');
  const {error}=await sb.from('videos').update({timestamps:newTs}).eq('id',vid).eq('user_id',currentUser.id);
  if (error) { showToast('삭제 실패'); setSyncStatus('error'); return; }
  v.timestamps=newTs; setSyncStatus('ok'); goDetail(vid);
}

async function editVideoMemo(id) {
  const v=appData.videos.find(x=>x.id===id); if(!v) return;
  const memo=prompt('메모를 수정하세요:',v.memo); if(memo===null) return;
  setSyncStatus('syncing');
  const {error}=await sb.from('videos').update({memo}).eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('저장 실패'); setSyncStatus('error'); return; }
  v.memo=memo; setSyncStatus('ok'); showToast('메모가 저장됐습니다'); goDetail(id);
}

async function deleteVideo(id) {
  if (!confirm('이 영상을 삭제하시겠습니까?')) return;
  setSyncStatus('syncing');
  const {error}=await sb.from('videos').delete().eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('삭제 실패'); setSyncStatus('error'); return; }
  appData.videos=appData.videos.filter(v=>v.id!==id);
  setSyncStatus('ok'); showToast('영상이 삭제됐습니다'); goList();
}

// EQUIPMENT LIST
// ════════════════════════════════════════════════════════
function renderEquipList() {
  const owned=appData.equipment.filter(e=>e.status==='owned');
  const wish=appData.equipment.filter(e=>e.status==='wishlist');
  const wishTotal=wish.reduce((a,e)=>{
    const lp=e.links.length?Math.min(...e.links.map(l=>l.price||Infinity)):0;
    return a+(lp===Infinity?0:lp);
  },0);
  const renderCard=(e)=>{
    const lp=e.links.length?e.links[e.links.length-1].price:e.purchasePrice;
    return `<div class="card" onclick="goDetail('${e.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="card-title">${escHtml(e.name)}</div>
          <div style="margin:4px 0">
            <span class="badge ${e.status==='owned'?'badge-green':'badge-amber'}">${e.status==='owned'?'✓ 보유':'★ 관심'}</span>
            <span class="badge badge-blue">${escHtml(e.category)}</span>
          </div>
          ${e.memo?`<div class="card-meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">${escHtml(e.memo)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:0.75rem">
          ${lp?`<div class="link-price">${fmtPrice(lp)}</div>`:''}
          ${e.links.length?`<div style="font-size:0.72rem;color:var(--text-muted)">${e.links.length}개 링크</div>`:''}
          ${renderPriceTrend(e)}
        </div>
      </div>
    </div>`;
  };
  let cards=appData.equipment.length?appData.equipment.map(renderCard).join(''):`<div class="empty-state"><div class="empty-icon">🏌️</div>등록된 장비가 없습니다.</div>`;
  return `
  <div class="page">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${owned.length}</div><div class="stat-label">보유 장비</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#e8a050">${wish.length}</div><div class="stat-label">관심 목록</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:1rem;padding-top:6px">${wishTotal?fmtPrice(wishTotal):'—'}</div><div class="stat-label">관심 합계</div></div>
    </div>
    <div class="filter-bar">
      <input type="text" placeholder="🔍 장비명 검색..." oninput="filterEquip(this.value,document.getElementById('ecat').value,document.getElementById('estat').value)" id="esearch">
      <select id="ecat" onchange="filterEquip(document.getElementById('esearch').value,this.value,document.getElementById('estat').value)">
        <option value="">전체 분류</option>${EQUIP_CATS.map(c=>`<option>${c}</option>`).join('')}
      </select>
      <select id="estat" onchange="filterEquip(document.getElementById('esearch').value,document.getElementById('ecat').value,this.value)">
        <option value="">전체</option><option value="owned">보유</option><option value="wishlist">관심</option>
      </select>
    </div>
    <div id="equip-cards">${cards}</div>
    <button class="btn btn-primary" style="margin-top:0.5rem" onclick="goAdd()">+ 장비 추가</button>
  </div>`;
}

function renderPriceTrend(e) {
  if (!e.priceHistory||e.priceHistory.length<2) return '';
  const last=e.priceHistory[e.priceHistory.length-1].price;
  const prev=e.priceHistory[e.priceHistory.length-2].price;
  const diff=last-prev; if(diff===0) return '';

async function saveEquip() {
  const name=document.getElementById('e-name').value.trim();
  if (!name) { showToast('장비명을 입력하세요'); return; }
  const statusEl=document.querySelector('input[name="e-status"]:checked');
  const status=statusEl?statusEl.value:'wishlist';
  const category=document.getElementById('e-cat').value;
  const memo=document.getElementById('e-memo').value.trim();
  const link=document.getElementById('e-link').value.trim();
  const llabel=document.getElementById('e-llabel').value.trim();
  const lprice=document.getElementById('e-lprice').value;
  const pprice=document.getElementById('e-pprice')?.value;
  const pdate=document.getElementById('e-pdate')?.value;
  const links=link?[{url:link,label:llabel||'링크',price:lprice?Number(lprice):null,checkedAt:today()}]:[];
  const priceHistory=(lprice&&link)?[{date:today(),price:Number(lprice)}]:[];
  const btn=document.getElementById('e-save-btn'); btn.disabled=true; btn.textContent='저장 중...';
  setSyncStatus('syncing');
  const {error}=await sb.from('equipment').insert({
    user_id:currentUser.id, name, category, status, memo, links, price_history:priceHistory,
    purchase_price:pprice?Number(pprice):null, purchase_date:pdate||null
  });
  if (error) { showToast('저장 실패: '+error.message); btn.disabled=false; btn.textContent='저장'; setSyncStatus('error'); return; }
  await loadAllData();
  showToast('장비가 추가됐습니다'); goList();
}

async function addLink(id) {
  const url=document.getElementById('new-link-url').value.trim();
  const label=document.getElementById('new-link-label').value.trim();
  const price=document.getElementById('new-link-price').value;
  if (!url) { showToast('URL을 입력하세요'); return; }
  const e=appData.equipment.find(x=>x.id===id); if(!e) return;
  const priceNum=price?Number(price):null;
  const newLinks=[...e.links,{url,label:label||'링크',price:priceNum,checkedAt:today()}];
  const newHist=priceNum?[...e.priceHistory,{date:today(),price:priceNum}]:e.priceHistory;
  setSyncStatus('syncing');
  const {error}=await sb.from('equipment').update({links:newLinks,price_history:newHist}).eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('저장 실패'); setSyncStatus('error'); return; }
  e.links=newLinks; e.priceHistory=newHist; setSyncStatus('ok'); showToast('링크가 추가됐습니다'); goDetail(id);
}

async function updateLinkPrice(eid,lidx) {
  const e=appData.equipment.find(x=>x.id===eid); if(!e) return;
  const l=e.links[lidx];
  const p=prompt(`새 가격 입력 (현재: ${fmtPrice(l.price)}):`,l.price||''); if(p===null) return;
  const newPrice=Number(p);
  const newLinks=e.links.map((lk,i)=>i===lidx?{...lk,price:newPrice,checkedAt:today()}:lk);
  const newHist=[...e.priceHistory,{date:today(),price:newPrice}];
  setSyncStatus('syncing');
  const {error}=await sb.from('equipment').update({links:newLinks,price_history:newHist}).eq('id',eid).eq('user_id',currentUser.id);
  if (error) { showToast('업데이트 실패'); setSyncStatus('error'); return; }
  e.links=newLinks; e.priceHistory=newHist; setSyncStatus('ok'); showToast('가격이 업데이트됐습니다'); goDetail(eid);
}

async function editEquipMemo(id) {
  const e=appData.equipment.find(x=>x.id===id); if(!e) return;
  const memo=prompt('메모를 수정하세요:',e.memo); if(memo===null) return;
  setSyncStatus('syncing');
  const {error}=await sb.from('equipment').update({memo}).eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('저장 실패'); setSyncStatus('error'); return; }
  e.memo=memo; setSyncStatus('ok'); showToast('메모가 저장됐습니다'); goDetail(id);
}

async function deleteEquip(id) {
  if (!confirm('이 장비를 삭제하시겠습니까?')) return;
  setSyncStatus('syncing');
  const {error}=await sb.from('equipment').delete().eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('삭제 실패'); setSyncStatus('error'); return; }
  appData.equipment=appData.equipment.filter(e=>e.id!==id);
  setSyncStatus('ok'); showToast('장비가 삭제됐습니다'); goList();
}

// PRACTICE — 유틸
// ════════════════════════════════════════════════════════
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }
function best(arr) { return arr.length ? Math.max(...arr) : null; }
function fmtNum(n, unit='') { return n!=null ? Math.round(n)+unit : '—'; }

function getSessionStats(s) {
  const shots = s.shots||[];
  const carries = shots.map(x=>x.carry).filter(x=>x>0);
  const totals  = shots.map(x=>x.total).filter(x=>x>0);
  const hs      = shots.map(x=>x.headSpeed).filter(x=>x>0);
  const bs      = shots.map(x=>x.ballSpeed).filter(x=>x>0);
  const sf      = shots.map(x=>x.smashFactor).filter(x=>x>0);
  const la      = shots.map(x=>x.launchAngle).filter(x=>x>0);
  const spin    = shots.map(x=>x.spin).filter(x=>x>0);
  const dirs    = shots.map(x=>x.direction).filter(x=>x!=null);
  return { carries, totals, hs, bs, sf, la, spin, dirs,
    avgCarry:avg(carries), bestCarry:best(carries),
    avgTotal:avg(totals),  bestTotal:best(totals),
    avgHs:avg(hs), bestHs:best(hs),
    avgBs:avg(bs), avgSf:avg(sf),
    avgLa:avg(la), avgSpin:avg(spin),
    avgDir:avg(dirs)
  };
}

function renderStatsPanel() {
  const sessions=[...appData.sessions].reverse(); // 오래된 순
  if (!sessions.length) return '<div style="color:var(--text-muted);font-size:0.85rem;padding:1rem 0">세션을 추가하면 통계가 표시됩니다.</div>';

  // 클럽별 통계
  const clubMap={};
  sessions.forEach(s=>{
    if(!s.club) return;
    if(!clubMap[s.club]) clubMap[s.club]={carries:[],totals:[],hs:[],bs:[],sf:[]};
    const st=getSessionStats(s);
    if(st.avgCarry) clubMap[s.club].carries.push(st.avgCarry);
    if(st.avgTotal) clubMap[s.club].totals.push(st.avgTotal);
    if(st.avgHs) clubMap[s.club].hs.push(st.avgHs);
    if(st.avgBs) clubMap[s.club].bs.push(st.avgBs);
    if(st.avgSf) clubMap[s.club].sf.push(st.avgSf);
  });

  const clubRows = Object.entries(clubMap).map(([club, d])=>`
    <tr>
      <td><span class="club-badge">${escHtml(club)}</span></td>
      <td class="val">${fmtNum(avg(d.carries),'m')}</td>
      <td class="val best">${fmtNum(best(d.carries),'m')}</td>
      <td class="val">${fmtNum(avg(d.hs))}</td>
      <td class="val">${fmtNum(avg(d.bs))}</td>
      <td class="val">${avg(d.sf)!=null?avg(d.sf).toFixed(2):'—'}</td>
    </tr>`).join('');

  return clubRows ? `
    <div class="section-label">클럽별 통계</div>
    <div style="overflow-x:auto;margin-bottom:1.25rem">
      <table class="stat-table">
        <thead><tr>
          <th>클럽</th><th>캐리 평균</th><th>캐리 베스트</th><th>헤드스피드</th><th>볼스피드</th><th>스매시</th>
        </tr></thead>
        <tbody>${clubRows}</tbody>
      </table>
    </div>` : '';
}

function initPracticeCharts() {
  const sessions=[...appData.sessions].reverse();
  if (!sessions.length) return;

  const labels = sessions.map(s=>s.date?.slice(5)||'');
  const carryData = sessions.map(s=>{ const st=getSessionStats(s); return st.avgCarry?Math.round(st.avgCarry):null; });
  const hsData    = sessions.map(s=>{ const st=getSessionStats(s); return st.avgHs?Math.round(st.avgHs):null; });

  const chartOpts = (label, color) => ({
    type:'line',
    data:{ labels, datasets:[{ label, data:carryData, borderColor:color, backgroundColor:color+'22',
      tension:0.35, fill:true, pointBackgroundColor:color, pointRadius:4, spanGaps:true }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{color:'#4a6a8a',font:{size:11}}, grid:{color:'rgba(255,255,255,0.04)'} },
        y:{ ticks:{color:'#4a6a8a',font:{size:11}}, grid:{color:'rgba(255,255,255,0.06)'} }
      }
    }
  });

  const cc = document.getElementById('chart-carry');
  const ch = document.getElementById('chart-hs');
  if (cc) {
    const cfg = chartOpts('캐리 평균(m)','#c8a84b');
    cfg.data.datasets[0].data = carryData;
    chartInstances['carry'] = new Chart(cc, cfg);
  }
  if (ch) {
    const cfg = chartOpts('헤드스피드','#52b870');
    cfg.data.datasets[0].data = hsData;
    cfg.data.datasets[0].borderColor='#52b870';
    cfg.data.datasets[0].backgroundColor='#52b87022';
    cfg.data.datasets[0].pointBackgroundColor='#52b870';
    chartInstances['hs'] = new Chart(ch, cfg);
  }
}

// PRACTICE DETAIL
// ════════════════════════════════════════════════════════
function renderPracticeDetail() {
  const s=appData.sessions.find(x=>x.id===selectedId);
  if(!s) return '<div class="empty-state">세션을 찾을 수 없습니다.</div>';
  const st=getSessionStats(s);
  const shots=s.shots||[];

  const shotsHtml = shots.length ? `
    <div style="overflow-x:auto">
      <table class="stat-table">
        <thead><tr>
          <th>#</th><th>캐리</th><th>총거리</th><th>헤드속도</th><th>볼속도</th><th>스매시</th><th>발사각</th><th>스핀</th><th>방향</th>
        </tr></thead>
        <tbody>
          ${shots.map((sh,i)=>`<tr>
            <td style="color:var(--text-muted)">${i+1}</td>
            <td class="val">${sh.carry||'—'}</td>
            <td class="val">${sh.total||'—'}</td>
            <td class="val">${sh.headSpeed||'—'}</td>
            <td class="val">${sh.ballSpeed||'—'}</td>
            <td class="val">${sh.smashFactor?Number(sh.smashFactor).toFixed(2):'—'}</td>
            <td class="val">${sh.launchAngle||'—'}</td>
            <td class="val">${sh.spin?Number(sh.spin).toLocaleString():'—'}</td>
            <td class="val" style="color:${sh.direction>0?'#e8a050':sh.direction<0?'#7ab0e8':'var(--text)'}">${sh.direction!=null?(sh.direction>0?'R+':sh.direction<0?'L':'0')+Math.abs(sh.direction||0):'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="stats-row" style="margin-top:1rem">
      ${st.avgCarry!=null?`<div class="stat-card"><div class="stat-num" style="font-size:1.3rem">${fmtNum(st.avgCarry,'m')}</div><div class="stat-label">캐리 평균</div></div>`:''}
      ${st.bestCarry!=null?`<div class="stat-card"><div class="stat-num" style="font-size:1.3rem;color:var(--gold2)">${fmtNum(st.bestCarry,'m')}</div><div class="stat-label">캐리 베스트</div></div>`:''}
      ${st.avgHs!=null?`<div class="stat-card"><div class="stat-num" style="font-size:1.3rem;color:var(--green2)">${fmtNum(st.avgHs)}</div><div class="stat-label">헤드스피드 평균</div></div>`:''}
    </div>` : '<div style="color:var(--text-muted);font-size:0.85rem;padding:0.5rem 0">기록된 샷이 없습니다.</div>';

  return `
  <div class="page">
    <button class="back-btn" onclick="goList()">← 연습 목록</button>
    <div class="detail-header">
      <div>
        <div class="detail-title">${s.date||''}</div>
        <div style="margin-top:6px;display:flex;gap:0.5rem;align-items:center">
          ${s.club?`<span class="club-badge">${escHtml(s.club)}</span>`:''}
          ${s.location?`<span style="font-size:0.78rem;color:var(--text-muted)">📍 ${escHtml(s.location)}</span>`:''}
        </div>
      </div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--gold2)">${shots.length}샷</div>
    </div>

    ${s.imageUrl?`
    <div class="section-label">GDR 화면</div>
    <img src="${escAttr(s.imageUrl)}" class="img-preview" onclick="window.open(this.src,'_blank')" alt="GDR 화면" style="max-height:300px;object-fit:contain;background:#000">
    `:''}

    <div class="section-label">샷 데이터</div>
    ${shotsHtml}

    ${s.memo?`<div class="section-label" style="margin-top:1rem">메모</div>
    <div style="font-size:0.9rem;color:var(--text-dim);line-height:1.7">${escHtml(s.memo)}</div>`:''}

    <div class="divider"></div>
    <div style="display:flex;justify-content:flex-end;gap:0.5rem">
      <button class="btn btn-danger btn-sm" onclick="deleteSession('${s.id}')">세션 삭제</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
let practiceShots = [];
let practiceImageFile = null;

function renderPracticeAdd() {

  return `
  <div class="page">

    <div class="add-form">
      <div class="add-form-title">연습 세션 추가</div>

}

function renderShotRow(idx) {
  return `
  <div class="shot-row" id="shot-row-${idx}">
    <span class="shot-num">SHOT ${idx+1}</span>
    <button class="shot-del-btn" onclick="removeShotRow(${idx})" title="삭제">✕</button>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>캐리(m)</label><input type="number" id="sh-carry-${idx}" placeholder="예: 215">
    </div>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>총거리(m)</label><input type="number" id="sh-total-${idx}" placeholder="예: 235">
    </div>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>헤드속도</label><input type="number" id="sh-hs-${idx}" placeholder="예: 43.2" step="0.1">
    </div>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>볼속도</label><input type="number" id="sh-bs-${idx}" placeholder="예: 64.5" step="0.1">
    </div>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>스매시팩터</label><input type="number" id="sh-sf-${idx}" placeholder="예: 1.49" step="0.01">
    </div>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>발사각(°)</label><input type="number" id="sh-la-${idx}" placeholder="예: 12.5" step="0.1">
    </div>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>스핀(rpm)</label><input type="number" id="sh-spin-${idx}" placeholder="예: 2800">
    </div>
    <div class="shot-field" style="margin-top:0.5rem">
      <label>방향(R+/L-)</label><input type="number" id="sh-dir-${idx}" placeholder="예: +5 또는 -3" step="0.1">
    </div>
  </div>`;
}

let shotCount = 1;
function addShotRow() {
  const container = document.getElementById('shots-container');
  const div = document.createElement('div');
  div.innerHTML = renderShotRow(shotCount);
  container.appendChild(div.firstElementChild);
  shotCount++;
}
function removeShotRow(idx) {
  const el = document.getElementById('shot-row-'+idx);
  if (el) el.remove();
}

function previewPracticeImg(input) {
  const file = input.files[0]; if(!file) return;
  practiceImageFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('p-img-preview-wrap').innerHTML =
      `<img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:6px;margin-bottom:0.5rem" alt="미리보기"><br>
       <span style="font-size:0.75rem;opacity:0.7">다른 사진으로 교체하려면 다시 탭하세요</span>`;
  };
  reader.readAsDataURL(file);
}

function collectShots() {
  const rows = document.querySelectorAll('[id^="shot-row-"]');
  const shots = [];
  rows.forEach(row => {
    const idx = row.id.replace('shot-row-','');
    const carry     = parseFloat(document.getElementById('sh-carry-'+idx)?.value)||0;
    const total     = parseFloat(document.getElementById('sh-total-'+idx)?.value)||0;
    const headSpeed = parseFloat(document.getElementById('sh-hs-'+idx)?.value)||0;
    const ballSpeed = parseFloat(document.getElementById('sh-bs-'+idx)?.value)||0;
    const smashFactor= parseFloat(document.getElementById('sh-sf-'+idx)?.value)||0;
    const launchAngle= parseFloat(document.getElementById('sh-la-'+idx)?.value)||0;
    const spin      = parseFloat(document.getElementById('sh-spin-'+idx)?.value)||0;
    const direction = document.getElementById('sh-dir-'+idx)?.value !== ''
      ? parseFloat(document.getElementById('sh-dir-'+idx)?.value) : null;
    // 아무것도 없으면 skip
    if (!carry && !total && !headSpeed) return;
    shots.push({ carry, total, headSpeed, ballSpeed, smashFactor, launchAngle, spin, direction });
  });
  return shots;
}

// ════════════════════════════════════════════════════════
// PRACTICE CRUD
// ════════════════════════════════════════════════════════
async function saveSession() {
  const date     = document.getElementById('p-date').value;
  const club     = document.getElementById('p-club').value;
  const location = document.getElementById('p-location').value.trim();
  const memo     = document.getElementById('p-memo').value.trim();
  const shots    = collectShots();

  if (!date) { showToast('날짜를 입력하세요'); return; }

  const btn = document.getElementById('p-save-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  setSyncStatus('syncing');

  // 이미지 업로드 (있을 때)
  let imageUrl = '';
  if (practiceImageFile) {
    const ext = practiceImageFile.name.split('.').pop();
    const path = `${currentUser.id}/${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage.from('gdr-images').upload(path, practiceImageFile);
    if (upErr) { showToast('이미지 업로드 실패: '+upErr.message); btn.disabled=false; btn.textContent='저장'; setSyncStatus('error'); return; }
    const { data: urlData } = sb.storage.from('gdr-images').getPublicUrl(path);
    // 공개 URL 대신 signed URL 사용 (private bucket)
    const { data: signed } = await sb.storage.from('gdr-images').createSignedUrl(path, 60*60*24*365);
    imageUrl = signed?.signedUrl || '';
  }

  const { error } = await sb.from('practice_sessions').insert({
    user_id: currentUser.id,
    session_date: date,
    club, location, memo,
    total_shots: shots.length,
    shots,
    image_url: imageUrl,
  });

  if (error) { showToast('저장 실패: '+error.message); btn.disabled=false; btn.textContent='저장'; setSyncStatus('error'); return; }

  practiceImageFile = null; shotCount = 1;
  await loadAllData();
  showToast('세션이 저장됐습니다');
  goList();
}

async function deleteSession(id) {
  if (!confirm('이 세션을 삭제하시겠습니까?')) return;
  setSyncStatus('syncing');
  const { error } = await sb.from('practice_sessions').delete().eq('id',id).eq('user_id',currentUser.id);
  if (error) { showToast('삭제 실패'); setSyncStatus('error'); return; }
  appData.sessions = appData.sessions.filter(s=>s.id!==id);
  setSyncStatus('ok'); showToast('세션이 삭제됐습니다'); goList();
}

// ════════════════════════════════════════════════════════
// 회원탈퇴 시 세션도 삭제하도록 deleteAccount 업데이트
// ════════════════════════════════════════════════════════
async function deleteAccount() {
  const confirmed = confirm(
    '정말로 탈퇴하시겠습니까?\n\n' +
    '· 저장된 영상 ' + appData.videos.length + '개\n' +
    '· 저장된 장비 ' + appData.equipment.length + '개\n' +
    '· 연습 세션 ' + appData.sessions.length + '개\n\n' +
    '모든 데이터가 즉시 영구 삭제됩니다. 이 작업은 되돌릴 수 없습니다.'
  );
  if (!confirmed) return;
  const reconfirm = prompt('탈퇴를 확인하려면 아래에 "탈퇴합니다"를 입력하세요:');
  if (reconfirm !== '탈퇴합니다') { showToast('탈퇴가 취소됐습니다'); return; }
  setSyncStatus('syncing');
  try {
    await sb.from('videos').delete().eq('user_id', currentUser.id);
    await sb.from('equipment').delete().eq('user_id', currentUser.id);
    await sb.from('practice_sessions').delete().eq('user_id', currentUser.id);
    if (realtimeChannel) sb.removeChannel(realtimeChannel);
    await sb.auth.signOut();
    currentUser=null; appData={videos:[],equipment:[],sessions:[]};
    closeAccountSettings();
    document.getElementById('app-screen').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
    showToast('모든 데이터가 삭제됐습니다. 이용해주셔서 감사합니다.');
  } catch(e) {
    showToast('오류가 발생했습니다: ' + e.message);
    setSyncStatus('error');
  }
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
